// ─── Anthropic API Call ───────────────────────────────────────────────────────
async function askAgent(userQuery, dbList) {
  const medicineNames = [...new Set(dbList.map(d => d.name))].join(", ");

  const systemPrompt = `You are MediFind — an AI medicine availability agent for Pakistani cities.
You help citizens find rare medicines at nearby stores, clinics, and hospitals.

Available medicines in database: ${medicineNames}

Your job:
1. Extract the medicine name from user query (handle typos, Urdu-English mix, brand/generic names).
2. Return a JSON object ONLY — no markdown, no explanation. Format:
{
  "identified_medicine": "<exact name from list, or closest match>",
  "confidence": "high|medium|low",
  "message_urdu": "<2-line friendly Urdu message to user about what you found>",
  "message_english": "<2-line friendly English message>",
  "not_found": false
}
If medicine not found in database at all, set "not_found": true and suggest what to do.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 400,
      system: systemPrompt,
      messages: [{ role: "user", content: userQuery }],
    }),
  });
  const data = await res.json();
  const text = data.content?.map(b => b.text || "").join("") || "";
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

