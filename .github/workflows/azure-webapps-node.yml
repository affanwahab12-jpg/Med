// ─── Main App ─────────────────────────────────────────────────────────────────
export default function MediFind() {
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [aiResponse, setAiResponse] = useState(null);
  const [error, setError] = useState("");
  const [tab, setTab] = useState("search");
  const inputRef = useRef();

  useEffect(() => { inputRef.current?.focus(); }, []);

  const handleSearch = async () => {
    if (!query.trim()) return;
    setLoading(true);
    setResults(null);
    setAiResponse(null);
    setError("");

    try {
      const aiRes = await askAgent(query, MEDICINE_DB);
      setAiResponse(aiRes);

      if (aiRes.not_found) {
        setResults([]);
      } else {
        const matches = MEDICINE_DB.filter(d =>
          d.name.toLowerCase().includes(
            aiRes.identified_medicine?.toLowerCase().split(" ")[0] || ""
          )
        ).sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));
        setResults(matches);
      }
    } catch (e) {
      setError("Connection error. Please check your internet and try again.");
    } finally {
      setLoading(false);
    }
  };

  const suggestions = [
    "Rifampicin 600mg chahiye",
    "Clofazimine kahan milegi?",
    "Cycloserine available hai?",
    "Colchicine tablets dhundho",
  ];

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(160deg, #f0faf6 0%, #e8f4fd 50%, #f5e8fd 100%)",
      fontFamily: "'Segoe UI', system-ui, sans-serif",
      padding: "0 0 40px 0",
    }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #0f7b5c, #1a6bbd)",
        padding: "20px 24px 24px",
        color: "#fff",
      }}>
        <div style={{ maxWidth: 680, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
            <div style={{
              width: 44, height: 44, borderRadius: 12,
              background: "#ffffff25", display: "flex",
              alignItems: "center", justifyContent: "center", fontSize: 22
            }}>💊</div>
            <div>
              <div style={{ fontWeight: 800, fontSize: 22, letterSpacing: -0.5 }}>MediFind AI</div>
              <div style={{ fontSize: 12, opacity: 0.85 }}>
                Apne shehar mein koi bhi medicine talash karo — seconds mein
              </div>
            </div>
          </div>

          {/* Tab Bar */}
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            {[
              { key: "search", label: "🔍 Medicine Dhundho" },
              { key: "deploy", label: "🚀 Deploy Guide" },
            ].map(t => (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                padding: "7px 16px", borderRadius: 20, border: "none",
                cursor: "pointer", fontSize: 13, fontWeight: 600,
                background: tab === t.key ? "#fff" : "#ffffff25",
                color: tab === t.key ? "#0f7b5c" : "#fff",
                transition: "all 0.2s",
              }}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 680, margin: "0 auto", padding: "0 16px" }}>

        {tab === "search" && (
          <>
            {/* Search Box */}
            <div style={{
              background: "#fff", borderRadius: 18,
              boxShadow: "0 8px 32px #0f7b5c20",
              padding: "20px", marginTop: -12, position: "relative", zIndex: 2,
            }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#888", marginBottom: 8 }}>
                Medicine ka naam likhein (Urdu ya English mein)
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <input
                  ref={inputRef}
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleSearch()}
                  placeholder="e.g. Rifampicin chahiye, Colchicine kahan milegi..."
                  style={{
                    flex: 1, padding: "12px 16px", borderRadius: 12,
                    border: "2px solid #e0e0e0", fontSize: 14,
                    outline: "none", transition: "border 0.2s",
                    background: "#f8f9fa",
                  }}
                  onFocus={e => e.target.style.borderColor = "#0f7b5c"}
                  onBlur={e => e.target.style.borderColor = "#e0e0e0"}
                />
                <button
                  onClick={handleSearch}
                  disabled={loading || !query.trim()}
                  style={{
                    padding: "12px 22px", borderRadius: 12,
                    background: loading ? "#aaa" : "linear-gradient(135deg, #0f7b5c, #1a6bbd)",
                    color: "#fff", border: "none", cursor: loading ? "wait" : "pointer",
                    fontWeight: 700, fontSize: 14, whiteSpace: "nowrap",
                    transition: "opacity 0.2s",
                  }}
                >
                  {loading ? "⏳ Searching..." : "🔍 Talash Karo"}
                </button>
              </div>

              {/* Suggestions */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 12 }}>
                {suggestions.map((s, i) => (
                  <button key={i} onClick={() => { setQuery(s); }} style={{
                    padding: "5px 12px", borderRadius: 20,
                    background: "#f0faf6", border: "1px solid #0f7b5c30",
                    color: "#0f7b5c", fontSize: 12, fontWeight: 600,
                    cursor: "pointer",
                  }}>{s}</button>
                ))}
              </div>
            </div>

            {/* Error */}
            {error && (
              <div style={{
                background: "#fff0f0", border: "1px solid #ffaaaa",
                borderRadius: 12, padding: 14, marginTop: 14,
                color: "#c0392b", fontSize: 13
              }}>❌ {error}</div>
            )}

            {/* AI Message */}
            {aiResponse && (
              <div style={{
                background: "linear-gradient(135deg, #e6f7f2, #e8f0fb)",
                border: "1.5px solid #0f7b5c30",
                borderRadius: 14, padding: "16px 18px", marginTop: 16,
              }}>
                <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                  <div style={{ fontSize: 22 }}>🤖</div>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 13, color: "#0f7b5c", marginBottom: 4 }}>
                      MediFind AI — {aiResponse.confidence === "high" ? "✅ Puri confidence ke saath mila" : aiResponse.confidence === "medium" ? "🟡 Zyada chance hai ye sahi hai" : "⚠️ Approximate match"}
                    </div>
                    <div style={{ fontSize: 14, color: "#333", marginBottom: 4 }}>
                      {aiResponse.message_urdu}
                    </div>
                    <div style={{ fontSize: 13, color: "#555" }}>
                      {aiResponse.message_english}
                    </div>
                    {aiResponse.identified_medicine && !aiResponse.not_found && (
                      <div style={{
                        marginTop: 8, fontSize: 12, fontWeight: 700,
                        color: "#1a6bbd",
                      }}>
                        🔎 Searching for: <span style={{ fontFamily: "monospace" }}>{aiResponse.identified_medicine}</span>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* Results */}
            {results !== null && (
              <div style={{ marginTop: 18 }}>
                {results.length === 0 ? (
                  <div style={{
                    textAlign: "center", padding: "32px 20px",
                    background: "#fff", borderRadius: 16,
                    border: "1px solid #eee",
                  }}>
                    <div style={{ fontSize: 40, marginBottom: 10 }}>😔</div>
                    <div style={{ fontWeight: 700, fontSize: 16, color: "#333", marginBottom: 6 }}>
                      Ye medicine abhi available nahi
                    </div>
                    <div style={{ fontSize# This workflow will build and push a node.js application to an Azure Web App when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure App Service web app.
# For instructions see https://docs.microsoft.com/en-us/azure/app-service/quickstart-nodejs?tabs=linux&pivots=development-environment-cli
#
# To configure this workflow:
#
# 1. Download the Publish Profile for your Azure Web App. You can download this file from the Overview page of your Web App in the Azure Portal.
#    For more information: https://docs.microsoft.com/en-us/azure/app-service/deploy-github-actions?tabs=applevel#generate-deployment-credentials
#
# 2. Create a secret in your repository named AZURE_WEBAPP_PUBLISH_PROFILE, paste the publish profile contents as the value of the secret.
#    For instructions on obtaining the publish profile see: https://docs.microsoft.com/azure/app-service/deploy-github-actions#configure-the-github-secret
#
# 3. Change the value for the AZURE_WEBAPP_NAME. Optionally, change the AZURE_WEBAPP_PACKAGE_PATH and NODE_VERSION environment variables below.
#
# For more information on GitHub Actions for Azure: https://github.com/Azure/Actions
# For more information on the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# For more samples to get started with GitHub Action workflows to deploy to Azure: https://github.com/Azure/actions-workflow-samples

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: your-app-name    # set this to your application's name
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # set this to the path to your web app project, defaults to the repository root
  NODE_VERSION: '20.x'                # set this to the node version to use

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: npm install, build, and test
      run: |
        npm install
        npm run build --if-present
        npm run test --if-present

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: .

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: 'Deploy to Azure WebApp'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
